<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaulty - Smart Link Organizer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #f8fafc;
        }
        .brand-heading {
            font-family: 'Space Grotesk', sans-serif;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #312e81;
            border-radius: 10px;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .pin-shine {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            border: 1px solid rgba(59, 130, 246, 0.6) !important;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 pb-6 border-b border-slate-800">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-blue-600 to-emerald-500 flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-bolt-lightning text-xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold brand-heading tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-200 to-blue-400">Vaulty</h1>
                    <p class="text-xs text-slate-400 tracking-wide uppercase font-medium">100% Free • Zero Passwords • Secure</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3 w-full md:w-auto justify-end">
                <div class="bg-slate-900/60 p-3 rounded-xl border border-slate-800 text-right min-w-[200px]">
                    <div class="flex justify-between text-xs font-semibold mb-1">
                        <span class="text-emerald-400"><i class="fa-solid fa-fire mr-1"></i> Mastery Progress</span>
                        <span id="streak-percent" class="text-slate-300">0%</span>
                    </div>
                    <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                        <div id="streak-bar" class="bg-gradient-to-r from-blue-500 to-emerald-400 h-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>

                <button onclick="toggleReminders()" id="reminder-btn" class="p-3 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white transition cursor-pointer" title="Toggle App Reminders">
                    <i class="fa-solid fa-bell"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="space-y-6 lg:col-span-1">
                <div class="glass-card p-6 rounded-2xl shadow-xl">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-white">
                        <i class="fa-solid fa-square-plus text-blue-500"></i> Drop New Resource
                    </h2>
                    <form id="link-form" class="space-y-4" onsubmit="saveResource(event)">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Paste URL Link</label>
                            <input type="url" id="link-url" required placeholder="https://instagram.com/reel/... or YouTube, TikTok" 
                                class="w-full px-4 py-2.5 rounded-xl bg-slate-900/80 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Resource Title / Note</label>
                            <input type="text" id="link-title" required placeholder="Quick descriptive note" 
                                class="w-full px-4 py-2.5 rounded-xl bg-slate-900/80 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Core Learning Category</label>
                            <select id="link-category" required class="w-full px-4 py-2.5 rounded-xl bg-slate-900/80 border border-slate-700 text-slate-300 focus:outline-none focus:border-blue-500 transition text-sm cursor-pointer">
                                <optgroup label="💼 Career & Professional">
                                    <option value="💼 Job Skills & Career">💼 Job Skills & Career</option>
                                    <option value="🤖 AI & Smart Tools">🤖 AI & Smart Tools</option>
                                    <option value="🚀 Entrepreneurship & Startups">🚀 Entrepreneurship & Startups</option>
                                    <option value="✍️ Content Creation & Copywriting">✍️ Content Creation & Copywriting</option>
                                </optgroup>
                                <optgroup label="🎓 Student & Academia">
                                    <option value="🎓 Study Hacks & Exams">🎓 Study Hacks & Exams</option>
                                    <option value="📚 Student Life & Education">📚 Student Life & Education</option>
                                    <option value="🔬 STEM & Tech Learning">🔬 STEM & Tech Learning</option>
                                    <option value="🗣️ Languages & Communication">🗣️ Languages & Communication</option>
                                </optgroup>
                                <optgroup label="🌱 Lifestyle & Self Growth">
                                    <option value="🌱 Personal Growth">🌱 Personal Growth</option>
                                    <option value="🏃‍♂️ Health & Wellness">🏃‍♂️ Health & Wellness</option>
                                    <option value="💰 Finance & Wealth">💰 Finance & Wealth</option>
                                    <option value="🎨 Creative Arts & Design">🎨 Creative Arts & Design</option>
                                    <option value="🏠 Life Hacks & Daily Prep">🏠 Life Hacks & Daily Prep</option>
                                    <option value="🍳 Cooking & Nutrition">🍳 Cooking & Nutrition</option>
                                    <option value="✈️ Travel & Exploration">✈️ Travel & Exploration</option>
                                </optgroup>
                            </select>
                        </div>
                        <button type="submit" class="w-full py-3 px-4 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold text-sm transition shadow-lg shadow-indigo-600/20 cursor-pointer flex items-center justify-center gap-2">
                            <i class="fa-solid fa-floppy-disk"></i> 💾 Save to Vault
                        </button>
                    </form>
                </div>

                <div class="glass-card p-6 rounded-2xl shadow-xl">
                    <h2 class="text-lg font-bold mb-2 flex items-center gap-2 text-white">
                        <i class="fa-solid fa-bolt text-amber-400"></i> Fast Learning Sprint
                    </h2>
                    <p class="text-xs text-slate-400 mb-4">Kill decision fatigue. Let Vaulty pull a single random unread item to master right now.</p>
                    <button onclick="launchQuickReview()" class="w-full py-2.5 px-4 rounded-xl bg-slate-800 hover:bg-slate-700 border border-slate-700 text-amber-400 font-semibold text-xs transition cursor-pointer flex items-center justify-center gap-2">
                        <i class="fa-solid fa-shuffle"></i> Pull Next Random Link
                    </button>
                    <div id="quick-review-box" class="mt-4 p-4 rounded-xl bg-slate-950/70 border border-slate-800 hidden">
                        </div>
                </div>

                <div class="flex gap-3">
                    <button onclick="exportToCSV()" class="flex-1 py-2.5 px-3 rounded-xl bg-emerald-950/40 hover:bg-emerald-900/40 border border-emerald-800/60 text-emerald-400 text-xs font-semibold transition cursor-pointer flex items-center justify-center gap-2">
                        <i class="fa-solid fa-file-excel"></i> Export to CSV
                    </button>
                    <button onclick="clearAllVault()" class="py-2.5 px-3 rounded-xl bg-rose-950/20 hover:bg-rose-900/40 border border-rose-900/60 text-rose-400 text-xs font-semibold transition cursor-pointer" title="Reset Data">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                
                <div id="pinned-section-container" class="hidden space-y-3">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-blue-400 flex items-center gap-1.5">
                        <i class="fa-solid fa-thumbtack rotate-45 text-sm"></i> Focus Zone (Highest Priority)
                    </h3>
                    <div id="pinned-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        </div>
                </div>

                <div class="glass-card rounded-2xl overflow-hidden shadow-xl">
                    <div class="flex bg-slate-900/80 p-2 border-b border-slate-800/80 gap-1">
                        <button onclick="switchTab('unread')" id="tab-unread" class="flex-1 py-3 text-xs md:text-sm font-semibold rounded-xl text-center cursor-pointer transition flex items-center justify-center gap-2 bg-blue-600 text-white">
                            <i class="fa-solid fa-envelope-open"></i> Inbox <span id="count-unread" class="text-[10px] bg-slate-950 px-1.5 py-0.5 rounded-full font-bold ml-1 text-blue-300">0</span>
                        </button>
                        <button onclick="switchTab('progress')" id="tab-progress" class="flex-1 py-3 text-xs md:text-sm font-semibold rounded-xl text-center cursor-pointer transition flex items-center justify-center gap-2 text-slate-400 hover:text-slate-200">
                            <i class="fa-solid fa-spinner"></i> In Progress <span id="count-progress" class="text-[10px] bg-slate-950 px-1.5 py-0.5 rounded-full font-bold ml-1 text-slate-400">0</span>
                        </button>
                        <button onclick="switchTab('mastered')" id="tab-mastered" class="flex-1 py-3 text-xs md:text-sm font-semibold rounded-xl text-center cursor-pointer transition flex items-center justify-center gap-2 text-slate-400 hover:text-slate-200">
                            <i class="fa-solid fa-circle-check"></i> Mastered <span id="count-mastered" class="text-[10px] bg-slate-950 px-1.5 py-0.5 rounded-full font-bold ml-1 text-emerald-400">0</span>
                        </button>
                    </div>

                    <div class="p-6">
                        <div class="flex flex-col md:flex-row gap-3 mb-6">
                            <div class="flex-1 relative">
                                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3 text-slate-500 text-sm"></i>
                                <input type="text" id="search-vault" oninput="renderVault()" placeholder="Search titles, platforms or tags..." 
                                    class="w-full pl-10 pr-4 py-2 rounded-xl bg-slate-950/60 border border-slate-800 text-white placeholder-slate-500 text-sm focus:outline-none focus:border-slate-700">
                            </div>
                            <select id="filter-category" onchange="renderVault()" class="px-3 py-2 rounded-xl bg-slate-950/60 border border-slate-800 text-slate-300 text-sm focus:outline-none cursor-pointer">
                                <option value="ALL">All Categories</option>
                                <option value="💼 Job Skills & Career">💼 Job Skills & Career</option>
                                <option value="🤖 AI & Smart Tools">🤖 AI & Smart Tools</option>
                                <option value="🚀 Entrepreneurship & Startups">🚀 Entrepreneurship & Startups</option>
                                <option value="✍️ Content Creation & Copywriting">✍️ Content Creation & Copywriting</option>
                                <option value="🎓 Study Hacks & Exams">🎓 Study Hacks & Exams</option>
                                <option value="📚 Student Life & Education">📚 Student Life & Education</option>
                                <option value="🔬 STEM & Tech Learning">🔬 STEM & Tech Learning</option>
                                <option value="🗣️ Languages & Communication">🗣️ Languages & Communication</option>
                                <option value="🌱 Personal Growth">🌱 Personal Growth</option>
                                <option value="🏃‍♂️ Health & Wellness">🏃‍♂️ Health & Wellness</option>
                                <option value="💰 Finance & Wealth">💰 Finance & Wealth</option>
                                <option value="🎨 Creative Arts & Design">🎨 Creative Arts & Design</option>
                                <option value="🏠 Life Hacks & Daily Prep">🏠 Life Hacks & Daily Prep</option>
                                <option value="🍳 Cooking & Nutrition">🍳 Cooking & Nutrition</option>
                                <option value="✈️ Travel & Exploration">✈️ Travel & Exploration</option>
                            </select>
                        </div>

                        <div id="vault-feed" class="space-y-4">
                            </div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script>
        let vaultItems = JSON.parse(localStorage.getItem('vaulty_data')) || [];
        let currentTab = 'unread';
        let remindersActive = JSON.parse(localStorage.getItem('vaulty_reminders')) !== false;

        function extractPlatform(url) {
            try {
                const domain = new URL(url).hostname.toLowerCase();
                if (domain.includes('youtube.com') || domain.includes('youtu.be')) return { name: 'YouTube', color: 'bg-rose-500/10 text-rose-400 border-rose-500/20', icon: 'fa-brands fa-youtube' };
                if (domain.includes('instagram.com')) return { name: 'Instagram', color: 'bg-pink-500/10 text-pink-400 border-pink-500/20', icon: 'fa-brands fa-instagram' };
                if (domain.includes('tiktok.com')) return { name: 'TikTok', color: 'bg-cyan-500/10 text-cyan-400 border-cyan-500/20', icon: 'fa-brands fa-tiktok' };
                if (domain.includes('linkedin.com')) return { name: 'LinkedIn', color: 'bg-blue-500/10 text-blue-400 border-blue-500/20', icon: 'fa-brands fa-linkedin' };
                if (domain.includes('medium.com')) return { name: 'Medium', color: 'bg-slate-300/10 text-slate-300 border-slate-500/20', icon: 'fa-brands fa-medium' };
                if (domain.includes('github.com')) return { name: 'GitHub', color: 'bg-purple-500/10 text-purple-400 border-purple-500/20', icon: 'fa-brands fa-github' };
                return { name: 'Web Article', color: 'bg-indigo-500/10 text-indigo-400 border-indigo-500/20', icon: 'fa-solid fa-globe' };
            } catch(e) {
                return { name: 'Link Resource', color: 'bg-slate-500/10 text-slate-400 border-slate-500/20', icon: 'fa-solid fa-link' };
            }
        }

        function saveResource(event) {
            event.preventDefault();
            const url = document.getElementById('link-url').value.trim();
            const title = document.getElementById('link-title').value.trim();
            const category = document.getElementById('link-category').value;

            const newItem = {
                id: 'vitem_' + Date.now(),
                url: url,
                title: title,
                category: category,
                status: 'unread',
                pinned: false,
                timestamp: new Date().toLocaleDateString()
            };

            vaultItems.unshift(newItem);
            saveToLocalStorage();
            document.getElementById('link-form').reset();
            renderVault();
            triggerAppReminderNudge('Link captured into your Inbox Vault successfully! ⚡');
        }

        function saveToLocalStorage() {
            localStorage.setItem('vaulty_data', JSON.stringify(vaultItems));
            updateMetricsAndStreak();
        }

        function switchTab(tabName) {
            currentTab = tabName;
            ['unread', 'progress', 'mastered'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tabName) {
                    btn.className = "flex-1 py-3 text-xs md:text-sm font-semibold rounded-xl text-center cursor-pointer transition flex items-center justify-center gap-2 bg-blue-600 text-white";
                } else {
                    btn.className = "flex-1 py-3 text-xs md:text-sm font-semibold rounded-xl text-center cursor-pointer transition flex items-center justify-center gap-2 text-slate-400 hover:text-slate-200";
                }
            });
            renderVault();
        }

        function renderVault() {
            const feed = document.getElementById('vault-feed');
            const pinnedGrid = document.getElementById('pinned-grid');
            const pinnedSection = document.getElementById('pinned-section-container');
            
            const searchTerm = document.getElementById('search-vault').value.toLowerCase();
            const categoryFilter = document.getElementById('filter-category').value;

            const pinnedItems = vaultItems.filter(item => item.pinned);
            if (pinnedItems.length > 0) {
                pinnedSection.classList.remove('hidden');
                pinnedGrid.innerHTML = pinnedItems.map(item => createCardHTML(item, true)).join('');
            } else {
                pinnedSection.classList.add('hidden');
                pinnedGrid.innerHTML = '';
            }

            let filtered = vaultItems.filter(item => item.status === currentTab);
            if (categoryFilter !== 'ALL') {
                filtered = filtered.filter(item => item.category === categoryFilter);
            }
            if (searchTerm) {
                filtered = filtered.filter(item => item.title.toLowerCase().includes(searchTerm) || extractPlatform(item.url).name.toLowerCase().includes(searchTerm));
            }

            if (filtered.length === 0) {
                feed.innerHTML = `
                    <div class="text-center py-12 px-4 rounded-xl border border-dashed border-slate-800 text-slate-500">
                        <i class="fa-solid fa-box-open text-3xl mb-3 block text-slate-600"></i>
                        <p class="text-sm">No assets match criteria inside ${currentTab.toUpperCase()}.</p>
                    </div>`;
            } else {
                feed.innerHTML = filtered.map(item => createCardHTML(item, false)).join('');
            }
            updateCounts();
        }

        function createCardHTML(item, isPinnedGrid = false) {
            const platform = extractPlatform(item.url);
            let statusBtn = '';
            if (item.status === 'unread') {
                statusBtn = `<button onclick="updateStatus('${item.id}', 'progress')" class="px-2.5 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-blue-400 text-xs font-semibold cursor-pointer transition flex items-center gap-1"><i class="fa-solid fa-play text-[10px]"></i> Study</button>`;
            } else if (item.status === 'progress') {
                statusBtn = `<button onclick="updateStatus('${item.id}', 'mastered')" class="px-2.5 py-1.5 rounded-lg bg-emerald-950 text-emerald-400 border border-emerald-800/40 text-xs font-semibold cursor-pointer transition flex items-center gap-1"><i class="fa-solid fa-check text-[10px]"></i> Master</button>`;
            } else {
                statusBtn = `<span class="px-2.5 py-1 rounded-lg bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs font-bold flex items-center gap-1"><i class="fa-solid fa-circle-check"></i> Mastered</span>`;
            }

            const pinIconColor = item.pinned ? 'text-blue-400' : 'text-slate-500 hover:text-blue-400';
            return `
                <div class="p-4 rounded-xl bg-slate-900/40 border border-slate-800/80 hover:border-slate-700 transition flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 ${isPinnedGrid ? 'pin-shine bg-slate-900/70' : ''}">
                    <div class="space-y-1.5 flex-1 min-w-0">
                        <div class="flex flex-wrap gap-2 items-center">
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold border ${platform.color} flex items-center gap-1 uppercase tracking-wider">
                                <i class="${platform.icon}"></i> ${platform.name}
                            </span>
                            <span class="text-[11px] text-slate-400 bg-slate-950 px-2 py-0.5 rounded font-medium">${item.category}</span>
                        </div>
                        <h4 class="text-sm font-semibold text-white truncate max-w-md">${item.title}</h4>
                        <a href="${item.url}" target="_blank" class="text-xs text-blue-400 hover:underline block truncate max-w-sm"><i class="fa-solid fa-arrow-up-right-from-square text-[9px] mr-1"></i> Launch Link</a>
                    </div>
                    <div class="flex items-center gap-2 self-end sm:self-center">
                        ${statusBtn}
                        <div class="flex items-center bg-slate-950/60 rounded-lg p-0.5 border border-slate-800/60">
                            <button onclick="togglePin('${item.id}')" class="${pinIconColor} text-xs p-1.5 cursor-pointer"><i class="fa-solid fa-thumbtack ${item.pinned ? '' : 'rotate-45'}"></i></button>
                            <button onclick="deleteItem('${item.id}')" class="text-slate-500 hover:text-rose-400 text-xs p-1.5 cursor-pointer"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleReminders() {
            remindersActive = !remindersActive;
            localStorage.setItem('vaulty_reminders', JSON.stringify(remindersActive));
            document.getElementById('reminder-btn').className = remindersActive ? "p-3 rounded-xl bg-slate-800 text-slate-300" : "p-3 rounded-xl bg-slate-950 text-slate-600";
            if (remindersActive) triggerAppReminderNudge("Vaulty Nudge Reminders Turned On! 🔔");
        }

        function triggerAppReminderNudge(message) {
            if (!remindersActive) return;
            const alertBox = document.createElement('div');
            alertBox.className = "fixed bottom-5 right-5 z-50 p-4 rounded-xl bg-slate-900 border border-slate-700 text-slate-100 shadow-2xl flex items-center gap-3 max-w-sm text-xs font-semibold";
            alertBox.innerHTML = `<i class="fa-solid fa-circle-info text-blue-400 text-base"></i> <span>${message}</span>`;
            document.body.appendChild(alertBox);
            setTimeout(() => alertBox.remove(), 4000);
        }

        function launchQuickReview() {
            const unreadItems = vaultItems.filter(item => item.status === 'unread');
            const reviewBox = document.getElementById('quick-review-box');
            if (unreadItems.length === 0) {
                reviewBox.classList.remove('hidden');
                reviewBox.innerHTML = `<p class="text-xs text-emerald-400 font-medium"><i class="fa-solid fa-circle-check"></i> Great job! No unread links in your Inbox.</p>`;
                return;
            }
            const randomItem = unreadItems[Math.floor(Math.random() * unreadItems.length)];
            reviewBox.classList.remove('hidden');
            reviewBox.innerHTML = `
                <div class="space-y-2">
                    <div class="text-[10px] font-bold text-amber-400 uppercase tracking-wider">🎯 Active Target</div>
                    <div class="text-xs font-semibold text-white truncate">${randomItem.title}</div>
                    <div class="pt-2 flex gap-2">
                        <a href="${randomItem.url}" target="_blank" onclick="updateStatus('${randomItem.id}', 'progress')" class="flex-1 text-center py-1.5 rounded bg-blue-600 text-white text-[11px] font-bold">Open & Learn</a>
                        <button onclick="document.getElementById('quick-review-box').classList.add('hidden')" class="px-2 py-1.5 rounded bg-slate-800 text-slate-400 text-[11px]">Skip</button>
                    </div>
                </div>
            `;
        }

        function updateStatus(id, targetStatus) {
            const item = vaultItems.find(i => i.id === id);
            if (item) {
                item.status = targetStatus;
                saveToLocalStorage();
                renderVault();
                if (targetStatus === 'mastered') {
                    triggerAppReminderNudge('Incredible! Progress Bar Boosted! 🏆');
                    document.getElementById('quick-review-box').classList.add('hidden');
                }
            }
        }

        function togglePin(id) {
            const item = vaultItems.find(i => i.id === id);
            if (item) { item.pinned = !item.pinned; saveToLocalStorage(); renderVault(); }
        }

        function deleteItem(id) {
            vaultItems = vaultItems.filter(i => i.id !== id); saveToLocalStorage(); renderVault();
        }

        function clearAllVault() {
            if (confirm("Flush all local storage link data?")) { vaultItems = []; saveToLocalStorage(); renderVault(); }
        }

        function updateCounts() {
            document.getElementById('count-unread').innerText = vaultItems.filter(i => i.status === 'unread').length;
            document.getElementById('count-progress').innerText = vaultItems.filter(i => i.status === 'progress').length;
            document.getElementById('count-mastered').innerText = vaultItems.filter(i => i.status === 'mastered').length;
        }

        function updateMetricsAndStreak() {
            const total = vaultItems.length;
            if (total === 0) {
                document.getElementById('streak-percent').innerText = '0%';
                document.getElementById('streak-bar').style.width = '0%';
                return;
            }
            const percentage = Math.round((vaultItems.filter(i => i.status === 'mastered').length / total) * 100);
            document.getElementById('streak-percent').innerText = `${percentage}%`;
            document.getElementById('streak-bar').style.width = `${percentage}%`;
        }

        function exportToCSV() {
            if (vaultItems.length === 0) { alert("Your vault is empty!"); return; }
            let csvRows = [["ID", "Title", "Target URL", "Category Group", "Status Tier", "Focus Pinned", "Date Captured"].join(",")];
            vaultItems.forEach(item => {
                csvRows.push([item.id, `"${item.title.replace(/"/g, '""')}"`, `"${item.url}"`, `"${item.category}"`, item.status, item.pinned ? "YES" : "NO", item.timestamp].join(","));
            });
            const blobUrl = URL.createObjectURL(new Blob([csvRows.join("\n")], { type: 'text/csv;charset=utf-8;' }));
            const anchor = document.createElement('a');
            anchor.href = blobUrl;
            anchor.setAttribute('download', `Vaulty_Export_${new Date().toISOString().slice(0,10)}.csv`);
            anchor.click();
        }

        window.onload = function() {
            renderVault();
            updateMetricsAndStreak();
            setTimeout(() => {
                const unreadCount = vaultItems.filter(i => i.status === 'unread').length;
                if(unreadCount > 0) triggerAppReminderNudge(`Welcome back! You have ${unreadCount} items waiting in your Inbox Queue. 🚀`);
            }, 1500);
        };
    </script>
</body>
</html>
